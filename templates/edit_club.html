{% extends 'base.html' %}
{% block title %}OnTheTouchline | Edit Club{% endblock %}
{% block content %}
<div class="page-center">
    <div class="register-container">
        <h2>Редактирай Клуб</h2>
        <form method="post" enctype="multipart/form-data" class="register-form">
            {% csrf_token %}
            {% for field in form %}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="form-error">{{ field.errors|striptags }}</div>
                {% endif %}
            {% endfor %}
            <button type="submit" class="btn-primary">Запази промените</button>
        </form>
    </div>
</div>
{% endblock %}
